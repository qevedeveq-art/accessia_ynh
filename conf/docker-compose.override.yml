# ═══════════════════════════════════════════════════════════
#  ACCESSIA Pro — Override Docker Compose pour YunoHost
#  Généré par le script install via ynh_add_config
#  Les placeholders MAJUSCULES sont substitués par ynh_config_add
# ═══════════════════════════════════════════════════════════

services:

  backend:
    # BUG FIX: pas de /CRM/ — on clone le repo CRM directement dans install_dir
    ports:
      - "127.0.0.1:__PORT_BACKEND__:8000"
    volumes:
      - __DATA_DIR__:/sensia_data:rw
      - __INSTALL_DIR__:/repo:rw
      - __INSTALL_DIR__/CATALOGUE_OFFRES.md:/CATALOGUE_OFFRES.md:rw
    environment:
      SENSIA_BASE_DIR: /sensia_data
      DATABASE_URL: "sqlite:////sensia_data/_ACCESSIA_APP/sensia.db"
      GIT_REPO_PATH: /repo
      SECRET_KEY: "__SECRET_KEY__"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      ALLOWED_ORIGINS: "https://__DOMAIN__"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    restart: always
    mem_limit: 512m
    memswap_limit: 512m

  frontend:
    build:
      context: __INSTALL_DIR__/frontend
      args:
        # Baked au build-time dans le bundle JS — doit être le domaine public
        # nginx intercepte /api/* et proxie vers backend:__PORT_BACKEND__
        NEXT_PUBLIC_API_URL: "https://__DOMAIN__"
    ports:
      - "127.0.0.1:__PORT__:3001"
    environment:
      NEXT_PUBLIC_API_URL: "https://__DOMAIN__"
      INTERNAL_API_URL: "http://backend:8000"
      NODE_ENV: production
      # SECURITY FIX: active le mode production dans FastAPI (vérif SECRET_KEY)
      ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=512"
    restart: always
    mem_limit: 512m
    memswap_limit: 512m

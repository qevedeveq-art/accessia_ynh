#
# ACCESSIA Pro — Configuration nginx YunoHost
# Proxy vers frontend (Next.js) et backend (FastAPI)
#
# __DOMAIN__   → domaine YunoHost (ex: crm.mondomaine.fr)
# __PATH__     → chemin de base (/ ou /accessia)
# __PORT__     → port frontend (défaut: 3001)
# __PORT_BACKEND__ → port backend (défaut: 8001)
#

location __PATH__/ {

    proxy_pass http://127.0.0.1:__PORT__/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # WebSocket support (pour les fonctionnalités temps réel éventuelles)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts généreux pour les appels IA longs
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    # Taille max upload (documents clients, etc.)
    client_max_body_size 50M;

    # Cache désactivé pour le frontend dynamique
    proxy_cache_bypass 1;
    proxy_no_cache 1;

    more_set_headers "Strict-Transport-Security: max-age=15768000";
}

# Proxy dédié pour l'API backend
# Le navigateur appelle https://domain/api/* → nginx → backend:8001
location __PATH__/api/ {

    proxy_pass http://127.0.0.1:__PORT_BACKEND__/api/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    client_max_body_size 50M;

    # CORS géré par FastAPI — nginx ne l'ajoute pas
}

#
# ACCESSIA Pro — Configuration nginx YunoHost
# __DOMAIN__       → domaine (ex: crm.mondomaine.fr)
# __PATH__         → chemin (/)
# __PORT__         → port frontend Next.js
# __PORT_BACKEND__ → port backend FastAPI
#

location __PATH__ {

    proxy_pass http://127.0.0.1:__PORT__;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # WebSocket (hot reload dev, futures fonctionnalités temps réel)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts généreux pour les appels IA
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;

    # Upload documents clients
    client_max_body_size 50M;

    # Pas de cache sur le frontend dynamique
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # BUG FIX: add_header au lieu de more_set_headers (module non garanti)
    add_header Strict-Transport-Security "max-age=15768000" always;
}

# Proxy /api/* → backend FastAPI directement
# BUG FIX: location séparée explicite pour éviter le double slash quand PATH=/
location /api/ {

    proxy_pass http://127.0.0.1:__PORT_BACKEND__/api/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;

    client_max_body_size 50M;
}

# Assets statiques Next.js — cache agressif
location /_next/static/ {
    proxy_pass http://127.0.0.1:__PORT__/_next/static/;
    proxy_http_version 1.1;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

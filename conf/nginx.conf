#
# ACCESSIA Pro — Configuration nginx YunoHost (helpers v2.1)
#
# Placeholders substitués par ynh_config_add_nginx :
#   __DOMAIN__       → domaine (ex: crm.mondomaine.fr)
#   __PATH__         → chemin (/)  — __PATH__/ devient / quand path=/
#   __PORT__         → port frontend Next.js
#   __PORT_BACKEND__ → port backend FastAPI
#
# Patterns YunoHost :
#   #sub_path_only   → ligne activée uniquement si PATH != /
#   #root_path_only  → ligne activée uniquement si PATH == /
#

#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

location __PATH__/ {

    proxy_pass http://127.0.0.1:__PORT__/;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts généreux pour les appels IA
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;

    client_max_body_size 50M;

    # SECURITY: headers de sécurité — add_header (pas more_set_headers)
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Pas de cache sur le frontend dynamique
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
}

# Proxy API backend — le navigateur appelle /api/* → backend FastAPI
# Location séparée pour éviter le double slash si PATH=/
location /api/ {

    proxy_pass http://127.0.0.1:__PORT_BACKEND__/api/;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;

    client_max_body_size 50M;
}

# Cache agressif pour les assets statiques Next.js
location /_next/static/ {
    proxy_pass http://127.0.0.1:__PORT__/_next/static/;
    proxy_http_version 1.1;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

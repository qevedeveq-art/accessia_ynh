packaging_format = 2

id = "accessia"
name = "ACCESSIA Pro CRM"

description.en = "Professional CRM for service companies — contacts, proposals, invoices, AI assistant"
description.fr = "CRM professionnel pour entreprises de services — contacts, devis, factures, assistant IA"

version = "1.2.0~ynh1"

maintainers = ["quentin"]

[upstream]
license = "proprietary"
# URL du dépôt du package YunoHost (format requis : https://domain.tld/path/to/repo_ynh)
code = "https://github.com/qevedeveq-art/accessia_ynh"
# URL du code source de l'application
website = "https://github.com/qevedeveq-art/accessia-crm"

[integration]
yunohost = ">= 11.2"
helpers_version = "2.1"
architectures = "all"
multi_instance = false
ldap = false
# SSO YunoHost actif — l'app apparaît dans le portail et SSOwat protège l'accès
sso = true
disk = "1G"
ram.build = "1500M"
ram.runtime = "1024M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    help.en = "Who can access the app (users = YunoHost users only, visitors = public)"
    help.fr = "Qui peut accéder à l'app (users = utilisateurs YunoHost, visitors = public)"
    type = "group"
    # SSO : par défaut, accès réservé aux utilisateurs YunoHost authentifiés
    default = "all_users"

[resources]
    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    # Route principale — protégée par SSOwat (init_main_permission)
    # SSOwat injecte X-Remote-User dans chaque requête authentifiée
    main.url = "/"

    # Pages publiques client-facing (signature de devis, NPS, diagnostics partagés)
    # Accessibles sans compte YunoHost — l'accès est contrôlé par les tokens dans l'URL
    public.url = "/share"
    public.additional_urls = ["/sign", "/nps"]
    public.allowed = "visitors"
    public.show_tile = false
    public.auth_header = false

    # API endpoints publics correspondants (appelés par les pages publiques)
    public_api.url = "/api/share"
    public_api.additional_urls = [
        "/api/quotes/sign",
        "/api/nps/public",
        "/api/diagnostics/share",
        "/api/auth/status",
        "/api/health"
    ]
    public_api.allowed = "visitors"
    public_api.show_tile = false
    public_api.auth_header = false

    [resources.ports]
    [resources.ports.main]
    default = 3001

    [resources.ports.backend]
    default = 8001

    [resources.apt]
    # docker-compose (Debian Bookworm) dépend de docker.io | docker-ce — pas de conflit
    # docker-compose-plugin n'est PAS dans les repos Debian standards (repo Docker officiel requis)
    packages = "docker-compose git openssl sqlite3"
